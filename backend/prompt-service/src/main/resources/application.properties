spring.application.name=prompt-service

# ===============================
# PostgreSQL Database Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/prompt_manager
spring.datasource.username=postgres
spring.datasource.password=postgresql123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Server
# ===============================
server.port=${SERVER_PORT:8081}

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:dummy-jwt-secret-for-local-dev-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ===============================
# Login Credentials
# ===============================
auth.username=${AUTH_USERNAME:admin}
auth.password=${AUTH_PASSWORD:password}

# ===============================
# Cloudinary Configuration
# ===============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy-api-secret}

# ===============================
# Multipart Upload Limits
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
